services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: standard-fastapi-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - redis
    volumes:
      - sqlite_data:/app/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: standard-fastapi-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data

volumes:
  redis_data:
  sqlite_data:
